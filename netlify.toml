[build]
  command = "npm run build"
  publish = ".next"

# Secrets scanning: omit non-secret env vars that appear legitimately in docs/config
# OPENAI_MODEL is a model name (not a secret); NEXT_PUBLIC_APP_URL is intentionally public
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "OPENAI_MODEL,NEXT_PUBLIC_APP_URL"

# @netlify/plugin-nextjs (installed via UI) handles:
#   - serverless functions for pages/API routes
#   - routing and rewrites for Next.js
#   - image optimization
# DO NOT add catch-all redirects or manual functions directory here —
# they will intercept /_next/static/* assets and break CSS/JS loading.

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "OPENAI_MODEL,NEXT_PUBLIC_APP_URL"

[functions]
  node_bundler = "nft"
  # Netlify timeout limits: 30s (basic) or 60s (pro)
  # Our API targets: 25s max request time

# Security headers for API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Long-term cache for Next.js immutable static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
